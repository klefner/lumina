<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Lumina">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
  <title>Lumina</title>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="ui-overlay">
    <div id="wave-display"></div>
    <div id="right-col">
      <button id="pause-button" aria-label="Pause">&#10074;&#10074;</button>
      <div id="draw-score-display"></div>
      <div id="score-display"></div>
    </div>
  </div>
  <div id="tutorial-hint"></div>
  <div id="pause-overlay">
    <div id="pause-panel">
      <div id="pause-title">PAUSED</div>
      <button class="pause-menu-item" id="pause-resume">Resume</button>
      <button class="pause-menu-item" id="pause-save">Save Game</button>
      <button class="pause-menu-item" id="pause-load">Load Game</button>
      <button class="pause-menu-item" id="pause-restart-level">Restart Current Level</button>
      <button class="pause-menu-item" id="pause-restart-game">Restart Game</button>
      <button class="pause-menu-item" id="pause-exit">Exit Game</button>
      <div id="pause-fact"></div>
      <div id="pause-save-toast"></div>
    </div>
  </div>
  <div id="achievement-toast">
    <div id="achievement-badge"></div>
    <div id="achievement-label"></div>
  </div>
  <div id="message-overlay">
    <div id="message-title"></div>
    <div id="message-subtitle"></div>
    <div id="sound-hint">&#128266; best experienced with sound on</div>
  </div>
  <div id="version-display">__VERSION__</div>
  <script src="game.js?v=__BUILD__"></script>
</body>
</html>
