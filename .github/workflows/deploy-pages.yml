name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    # workflow_dispatch can be run against any branch from the Actions UI;
    # without this guard, a manual dispatch from a feature branch would stage
    # that branch's unreviewed content and still push it to Cloudflare as the
    # canonical `main` deployment (the wrangler command below hardcodes
    # --branch=main). Restrict the whole job to the actual main branch so
    # only a real push to (or dispatch against) main can ever go live.
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Stamp build version
        run: |
          BUILD="${GITHUB_SHA::7}"
          VERSION="${BUILD} . $(date -u +%Y-%m-%d)"
          sed -i "s/__BUILD__/${BUILD}/g; s/__VERSION__/${VERSION}/g" index.html version.json
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      # Stage only what the site actually needs — package.json/tests/CI
      # config etc. exist for the CI workflow, not for players, and have
      # no reason to ever be part of the deployed artifact.
      - name: Stage site files
        run: |
          mkdir _site
          cp index.html game.js style.css manifest.json version.json _site/
          cp -r icons sounds _site/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      # Cloudflare Pages is the canonical player-facing URL (no personal name
      # in it, unlike the klefner.github.io one above). Same staged _site
      # directory, so there is exactly one build output, not two.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name=lumina --branch=main
