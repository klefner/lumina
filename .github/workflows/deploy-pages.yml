name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Stamp build version
        run: |
          BUILD="${GITHUB_SHA::7}"
          VERSION="${BUILD} . $(date -u +%Y-%m-%d)"
          sed -i "s/__BUILD__/${BUILD}/g; s/__VERSION__/${VERSION}/g" index.html version.json
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      # Stage only what the site actually needs — package.json/tests/CI
      # config etc. exist for the CI workflow, not for players, and have
      # no reason to ever be part of the deployed artifact.
      - name: Stage site files
        run: |
          mkdir _site
          cp index.html game.js style.css manifest.json version.json _site/
          cp -r icons sounds _site/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
